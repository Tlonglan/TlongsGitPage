# Hugo configuration file
title: 蓝天龙的小站

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

# 配置网站多语言
defaultContentLanguage: zh-CN
languages:
  zh-CN:
    languageName: 简体中文
    weight: 1


markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true
      hardWraps: true

    
    extensions:
      # 支持数学公式
      passthrough:
        delimiters:
          block: [['\[', '\]'], ["$$", "$$"]]
          inline: [['\(', '\)'], ["$","$"]]
        enable: true
      # 启用 mark 扩展来支持 == == 语法
      extras:
        mark:             
          enable: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false


# 分类聚合
taxonomies:
  tag: "tags"   
  category: "categories"
  series: series


# 顶栏菜单 
menu:
  main:
    # - identifier: home
    #   name: Home
    #   pageRef: /
    #   weight: 5
    #   params:
    #     type: link
    #     icon: home

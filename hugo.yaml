        type: link
        icon: at-symbol




    - identifier: quick-start
      name: quick-start
      weight: 1
    - identifier: documentation
      name: Doc
      pageRef: /docs
      weight: 1
      parent: quick-start
      params:
        type: link
        icon: pencil-alt
    - identifier: references
      name: References
      pageRef: /references
      parent: quick-start
      weight: 2
      params:
        type: link
        icon: book-open
    - identifier: idea-workshop
      name: Idea-Workshop
      pageRef: /idea-workshop
      weight: 3
      parent: quick-start
      params:
        type: link
        icon: sparkles
    - identifier: greatresource
      name: Greatresource
      pageRef: /greatresource
      weight: 4
      parent: quick-start
      params:
        type: link
        icon: thumb-up
    - identifier: blog
      name: Blog
      pageRef: /blog
      weight: 5
      parent: quick-start
      params:
        type: link
        icon: user


    - identifier: content-classification
      name: content-classification
      weight: 2
    - identifier: website-tags
      name: Tags
      pageRef: /tags
      weight: 1
      parent: content-classification
      params:
        type: link
        icon: hashtag
    - identifier: content-series
      name: Content-series
      pageRef: /content-series
      weight: 2
      parent: content-classification
      params:
        type: link
        icon: academic-cap
    - identifier: series
      name: Series
      pageRef: /series
      weight: 3
      parent: content-classification
      params:
        type: link
        icon: library
    - identifier: archives
      name: Archives
      pageRef: /archives
      weight: 4
      parent: content-classification
    

    
    

    
    - identifier: about
      name: About
      pageRef: /about
      weight: 6
    - identifier: contact
      name: Contact ↗
      url: "https://github.com/Tlonglan"
      weight: 7
    - identifier: search
      name: Search
      weight: 8
      params:
        type: search
    - identifier: gitHub
      name: GitHub
      weight: 9
      url: "https://github.com/Tlonglan/TlongsGitPage"
      params:
        icon: github
    - identifier: bilibili
      name: Bilibili
      weight: 10
      url: "https://bilibili.com/"
      params:
        icon: Bilibili



enableGitInfo: true


# 相关配置参数
params:
  
  # 设置徽标内容以及跳转页面
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: static/logo.svg
      dark: static/logo-dark.svg
      link: /
      width: 40
      height: 20

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
  
  
  hextra:
    css:
      - /css/custom.css

  page:
    width: full
    contextMenu:
      enable: true


  blog:
    list:
      displayTags: true
  toc:
    displayTags: true

  # 文档信息展示
  ui:
    categoryLabel: "分类"
    tagLabel: "标签"
    dateLabel: "发布时间"
    lastmodLabel: "更新时间"
  
  dateFormat: "2006-01-02"   # 默认即可，支持"2006年1月2日"

  # 显示最后修改日期
  displayUpdatedDate: true
  # 显示最后修改的作者
  displayUpdatedAuthor: true
  


  
  # 代码块复制按钮
  highlight:
    copy:
      enable: true
      # hover | always
      display: hover
  
  # 评论系统
  comments:
    enable: true
    type: giscus

    giscus:
      repo: Tlonglan/TlongsGitPage
      repoId: R_kgDOSVn-gw
      category: Announcements
      categoryId: DIC_kwDOSVn-g84C8fg7
      lang: "zh-CN"                 # 建议明确指定语言，用 "zh-CN" 亦可
      reactionsEnabled: 1           # 开启 reactions
      inputPosition: "top"          # 评论输入框位置，可选 "top" 或 "bottom"
      loading: "lazy"               # 懒加载

  # 设置归档的默认目录和日期格式，即按时间线顺序查看
  archives:
    section: blog
    # dateFormat: "May 02"
    dateFormat: "1月2日"


# 在行内使用短代码显示图标，例如 {{< icon "github" >}}
enableInlineShortcodes: true
# Hugo configuration file
title: 蓝天龙的小站

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true
    # 支持数学公式
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ["$$", "$$"]]
          inline: [['\(', '\)'], ["$","$"]]
        enable: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false


    
menu:
  main:
    - identifier: Documentation
      name: 文档
      pageRef: /docs
      weight: 1
    - identifier: About
      name: 关于
      pageRef: /about
      weight: 2
    - identifier: Contact
      name: 联系 ↗
      url: "https://github.com/Tlonglan"
      weight: 3
    - identifier: Search
      name: 搜索
      weight: 4
      params:
        type: search
    - identifier: GitHub
      name: GitHub
      weight: 5
      url: "https://github.com/Tlonglan/TlongsGitPage"
      params:
        icon: github
    - identifier: Bilibili
      name: Bilibili
      weight: 6
      url: "https://bilibili.com/"
      params:
        icon: Bilibili

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"


defaultContentLanguage: zh-CN
languages:
  zh-CN:
    languageName: 简体中文
    weight: 1


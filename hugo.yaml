# Hugo configuration file
title: 蓝天龙的小站

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

# 配置网站多语言
defaultContentLanguage: zh-CN
languages:
  zh-CN:
    languageName: 简体中文
    weight: 1


markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true
    # 支持数学公式
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ["$$", "$$"]]
          inline: [['\(', '\)'], ["$","$"]]
        enable: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false



# 顶栏菜单 
menu:
  main:
    - identifier: home
      name: Home
      pageRef: /home
      weight: 1
      params:
        type: link
        icon: home


    - identifier: series
      name: Series
      weight: 2
    - identifier: documentation
      name: Doc
      parent: series
      pageRef: /docs
      weight: 1
      params:
        type: link
        icon: pencil-alt
    - identifier: showreel
      name: Showreel
      parent: series
      pageRef: /showreel
      weight: 2
      params:
        type: link
        icon: sparkles
    - identifier: references
      name: References
      parent: series
      pageRef: /references
      weight: 3
      params:
        type: link
        icon: book-open
    - identifier: greatresource
      name: Greatresource
      parent: series
      pageRef: /greatresource
      weight: 4
      params:
        type: link
        icon: thumb-up
      
    
    
    - identifier: about
      name: About
      pageRef: /about
      weight: 3
    - identifier: contact
      name: Contact ↗
      url: "https://github.com/Tlonglan"
      weight: 4
    - identifier: search
      name: Search
      weight: 5
      params:
        type: search
    - identifier: gitHub
      name: GitHub
      weight: 6
      url: "https://github.com/Tlonglan/TlongsGitPage"
      params:
        icon: github
    - identifier: bilibili
      name: Bilibili
      weight: 7
      url: "https://bilibili.com/"
      params:
        icon: Bilibili


# 相关配置参数
params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: static/logo.svg
      dark: static/logo-dark.svg
      link: /
      width: 40
      height: 20

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"

  # 代码块复制按钮
  highlight:
    copy:
      enable: true
      # hover | always
      display: hover


# 在行内使用短代码显示图标，例如 {{< icon "github" >}}
enableInlineShortcodes: true